[package]
authors.workspace    = true
description          = "Core Voxit shared types and services."
edition.workspace    = true
homepage.workspace   = true
license.workspace    = true
name                 = "voxit-core"
readme.workspace     = true
repository.workspace = true
version.workspace    = true

[features]
default        = ["voxit-realtime"]
voxit-realtime = ["dep:futures-util", "dep:http", "dep:tokio", "dep:tokio-tungstenite"]

[dependencies]
base64            = { version = "0.22" }
directories       = { version = "6.0" }
futures-util      = { version = "0.3", optional = true }
http              = { version = "1.3", optional = true }
keyring           = { version = "3.6", features = ["apple-native"] }
rand              = { version = "0.10" }
reqwest           = { version = "0.13", default-features = false, features = ["blocking", "json", "multipart", "rustls"] }
serde             = { version = "1.0", features = ["derive"] }
serde_json        = { version = "1.0" }
sha2              = { version = "0.10" }
tiny_http         = { version = "0.12" }
tokio             = { version = "1.47", features = ["rt-multi-thread", "time"], optional = true }
tokio-tungstenite = { version = "0.28", default-features = false, features = ["connect", "rustls-tls-native-roots"], optional = true }
tracing           = { version = "0.1" }
url               = { version = "2.5" }
voxit-audio       = { path = "../voxit-audio" }
webbrowser        = { version = "1.2" }
