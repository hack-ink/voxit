[package]
authors.workspace    = true
description          = "Core Voxit shared types and services."
edition.workspace    = true
homepage.workspace   = true
license.workspace    = true
name                 = "voxit-core"
readme.workspace     = true
repository.workspace = true
version.workspace    = true

[features]
default        = ["voxit-realtime"]
voxit-realtime = ["dep:futures-util", "dep:http", "dep:tokio", "dep:tokio-tungstenite"]

[dependencies]
base64            = { workspace = true }
directories       = { workspace = true }
futures-util      = { workspace = true, optional = true }
hound             = { workspace = true }
http              = { workspace = true, optional = true }
keyring           = { workspace = true }
reqwest           = { workspace = true }
serde             = { workspace = true }
serde_json        = { workspace = true }
sha2              = { workspace = true }
tokio             = { workspace = true, optional = true }
tokio-tungstenite = { workspace = true, optional = true }
tracing           = { workspace = true }
url               = { workspace = true }
voxit-audio       = { workspace = true }
webbrowser        = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation            = { workspace = true }
core-foundation-sys        = { workspace = true }
objc2-foundation           = { workspace = true }
objc2-local-authentication = { workspace = true }
security-framework-sys     = { workspace = true }
