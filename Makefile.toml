# Voxit workspace tasks.

# Check
# | task               | type      | cwd |
# | ------------------ | --------- | --- |
# | check              | composite |     |
# | check-rust         | command   |     |
# | check-swift        | composite |     |
# | check-vstyle       | composite |     |
# | check-vstyle-rust  | command   |     |
# | check-vstyle-swift | command   |     |

[tasks.check]
clear = true
workspace = false
dependencies = [
	"fmt-check",
	"check-rust",
	"check-swift",
	"check-vstyle",
	"test",
]

[tasks.check-rust]
workspace = false
command = "cargo"
args = [
	"clippy",
	"--all-features",
	"--all-targets",
	"--workspace",
	"--",
	"-D",
	"clippy::all",
	"-D",
	"clippy::too_many_lines",
	"-D",
	"clippy::unwrap_used",
	"-D",
	"clippy::use_self",
	"-D",
	"clippy::wildcard_imports",
	"-D",
	"missing-docs",
	"-D",
	"unused-crate-dependencies",
	"-D",
	"warnings",
]

[tasks.check-swift]
workspace = false
dependencies = [
	"build-swift-strict",
]

[tasks.check-vstyle]
workspace = false
dependencies = [
	"check-vstyle-rust",
	"check-vstyle-swift",
]

[tasks.check-vstyle-rust]
workspace = false
command = "cargo"
args = [
	"vstyle",
	"curate",
	"--language",
	"rust",
	"--workspace",
	"--all-features",
]

[tasks.check-vstyle-swift]
workspace = false
command = "cargo"
args = [
	"vstyle",
	"curate",
	"--language",
	"swift",
	"--workspace",
	"--all-features",
]

# Format
# | task            | type      | cwd |
# | --------------- | --------- | --- |
# | fmt             | composite |     |
# | fmt-check       | composite |     |
# | fmt-rust        | command   |     |
# | fmt-rust-check  | extend    |     |
# | fmt-swift       | command   |     |
# | fmt-swift-check | command   |     |
# | fmt-toml        | command   |     |
# | fmt-toml-check  | extend    |     |

[tasks.fmt]
workspace = false
dependencies = [
	"fmt-rust",
	"fmt-swift",
	"fmt-toml",
]

[tasks.fmt-check]
workspace = false
dependencies = [
	"fmt-rust-check",
	"fmt-swift-check",
	"fmt-toml-check",
]

[tasks.fmt-rust]
workspace = false
script = "cargo +nightly fmt --all"

[tasks.fmt-rust-check]
extend = "fmt-rust"
script = "cargo +nightly fmt --all -- --check"

[tasks.fmt-swift]
workspace = false
command = "swift"
args = [
	"format",
	"format",
	"--in-place",
	"--recursive",
	"--parallel",
	"native/macos-host/Sources",
]

[tasks.fmt-swift-check]
workspace = false
command = "swift"
args = [
	"format",
	"lint",
	"--recursive",
	"--strict",
	"--parallel",
	"native/macos-host/Sources",
]

[tasks.fmt-toml]
workspace = false
command = "taplo"
args = [
	"fmt",
]

[tasks.fmt-toml-check]
extend = "fmt-toml"
args = [
	"fmt",
	"--check",
]

# Lint
# | task               | type      | cwd |
# | ------------------ | --------- | --- |
# | lint               | composite |     |
# | lint-rust          | command   |     |
# | lint-swift         | composite |     |
# | lint-vstyle        | composite |     |
# | lint-vstyle-rust   | command   |     |
# | lint-vstyle-swift  | command   |     |

[tasks.lint]
workspace = false
dependencies = [
	"lint-rust",
	"lint-swift",
	"lint-vstyle",
]

[tasks.lint-rust]
workspace = false
command = "cargo"
args = [
	"clippy",
	"--fix",
	"--allow-dirty",
	"--all-features",
	"--all-targets",
	"--workspace",
	"--",
	"-D",
	"clippy::all",
	"-D",
	"clippy::too_many_lines",
	"-D",
	"clippy::unwrap_used",
	"-D",
	"clippy::use_self",
	"-D",
	"clippy::wildcard_imports",
	"-D",
	"missing-docs",
	"-D",
	"unused-crate-dependencies",
	"-D",
	"warnings",
]

[tasks.lint-swift]
workspace = false
dependencies = [
	"fmt-swift",
	"build-swift-strict",
]

[tasks.lint-vstyle]
workspace = false
dependencies = [
	"lint-vstyle-rust",
	"lint-vstyle-swift",
]

[tasks.lint-vstyle-rust]
workspace = false
command = "cargo"
args = [
	"vstyle",
	"tune",
	"--language",
	"rust",
	"--workspace",
	"--all-features",
	"--strict",
]

[tasks.lint-vstyle-swift]
workspace = false
command = "cargo"
args = [
	"vstyle",
	"tune",
	"--language",
	"swift",
	"--workspace",
	"--all-features",
	"--strict",
]

# Test
# | task                         | type      | cwd |
# | ---------------------------- | --------- | --- |
# | test                         | composite |     |
# | test-rust                    | command   |     |
# | test-swift                   | composite |     |
# | test-host-ffi-header         | command   |     |
# | test-macos-native-host       | command   |     |
# | test-macos-native-host-stage | command   |     |

[tasks.test]
clear = true
workspace = false
dependencies = [
	"test-rust",
	"test-swift",
]

[tasks.test-rust]
workspace = false
command = "cargo"
args = [
	"nextest",
	"run",
	"--workspace",
	"--all-targets",
	"--all-features",
]

[tasks.test-swift]
workspace = false
dependencies = [
	"test-host-ffi-header",
	"test-macos-native-host",
	"test-macos-native-host-stage",
]

[tasks.test-host-ffi-header]
workspace = false
command = "clang"
args = [
	"-std=c11",
	"-fsyntax-only",
	"-I",
	"packages/voxit-host-ffi/include",
	"packages/voxit-host-ffi/tests/header_smoke.c",
]

[tasks.test-macos-native-host]
workspace = false
dependencies = [
	"build-host-ffi-staticlib",
]
script = '''
VOXIT_HOST_FFI_LIB_DIR="$PWD/target/debug" \
swift run --package-path native/macos-host VoxitHostBridgeProbe
'''

[tasks.test-macos-native-host-stage]
workspace = false
script = '''
./scripts/build_and_run.sh stage
COMMON_ROOT="$(cd "$(git rev-parse --git-common-dir)/.." && pwd)"
STAGE_DIR="${VOXIT_NATIVE_HOST_STAGE_DIR:-$COMMON_ROOT/target/voxit-native-host}"
APP_PATH="$STAGE_DIR/Voxit.app"
test -d "$APP_PATH"
test -x "$APP_PATH/Contents/MacOS/VoxitNativeHost"
test -f "$APP_PATH/Contents/Info.plist"
test -f "$APP_PATH/Contents/Resources/AppIcon.icns"
test -f "$APP_PATH/Contents/Resources/StatusBarIcon.png"
codesign --verify --deep --strict "$APP_PATH"
codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -Eq '^(TeamIdentifier=|Signature=adhoc)'
plutil -extract CFBundleName raw "$APP_PATH/Contents/Info.plist" | grep -qx 'Voxit'
plutil -extract CFBundleDisplayName raw "$APP_PATH/Contents/Info.plist" | grep -qx 'Voxit'
plutil -extract CFBundleIdentifier raw "$APP_PATH/Contents/Info.plist" | grep -qx 'ink.hack.voxit'
plutil -extract CFBundleIconFile raw "$APP_PATH/Contents/Info.plist" | grep -qx 'AppIcon'
plutil -extract LSUIElement raw "$APP_PATH/Contents/Info.plist" | grep -qx 'true'
'''

# Build
# | task                     | type    | cwd |
# | ------------------------ | ------- | --- |
# | build-host-ffi-staticlib | command |     |
# | build-swift-strict       | command |     |

[tasks.build-host-ffi-staticlib]
workspace = false
env = { MACOSX_DEPLOYMENT_TARGET = "14.0" }
command = "cargo"
args = [
	"build",
	"-p",
	"voxit-host-ffi",
]

[tasks.build-swift-strict]
workspace = false
dependencies = [
	"build-host-ffi-staticlib",
]
script = '''
VOXIT_HOST_FFI_LIB_DIR="$PWD/target/debug" \
swift build --package-path native/macos-host \
	--explicit-target-dependency-import-check error \
	-Xswiftc -warnings-as-errors \
	-Xswiftc -strict-concurrency=complete
'''

# Meta
# | task   | type      | cwd |
# | ------ | --------- | --- |
# | checks | composite |     |

[tasks.checks]
workspace = false
dependencies = [
	"check",
]
