name: Release

permissions:
  contents: write

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_TERM_COLOR: always

  RUST_BACKTRACE: full

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build ${{ matrix.target.name }} package
    runs-on: ${{ matrix.target.os }}
    strategy:
      matrix:
        target:
          [
            { name: aarch64-apple-darwin, os: macos-latest }
            # { name: x86_64-unknown-linux-gnu, os: ubuntu-latest },
            # { name: x86_64-pc-windows-msvc, os: windows-latest },
          ]
    steps:
      - name: Fetch latest code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          components: rustfmt, clippy

      - name: Install cargo-bundle
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bundle

      - name: Add target
        run: rustup target add ${{ matrix.target.name }}

      - name: Build
        run: cargo build --profile final-release --locked --target ${{ matrix.target.name }} -p voxit

      - name: Bundle and Pack (macOS app)
        if: matrix.target.os == 'macos-latest'
        run: |
          cargo bundle --profile final-release --target ${{ matrix.target.name }} -p voxit
          APP_PATH="target/${{ matrix.target.name }}/bundle/osx/Voxit.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Could not locate Voxit.app at $APP_PATH"
            exit 1
          fi
          cp -R "$APP_PATH" .
          zip -r "voxit-${{ matrix.target.name }}.zip" Voxit.app
          rm -rf Voxit.app

      # - name: Pack (Windows)
      #   if: matrix.target.os == 'windows-latest'
      #   run: |
      #     mv target/${{ matrix.target.name }}/final-release/name_placeholder.exe .
      #     Compress-Archive -Path name_placeholder.exe -DestinationPath name_placeholder-${{ matrix.target.name }}.zip
      #
      # - name: Pack (Linux)
      #   if: matrix.target.os == 'ubuntu-latest'
      #   run: |
      #     mv target/${{ matrix.target.name }}/final-release/name_placeholder .
      #     tar -czvf name_placeholder-${{ matrix.target.name }}.tar.gz name_placeholder

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: voxit-${{ matrix.target.name }}
          path: voxit-${{ matrix.target.name }}.zip
          retention-days: 1

  # release:
  #   name: Release
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Publish
  #       uses: softprops/action-gh-release@v2
  #       with:
  #         discussion_category_name: Announcements
  #         generate_release_notes: true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7

      - name: Hash
        run: |
          mkdir -p artifacts
          mv voxit-*/* artifacts/
          cd artifacts
          sha256sum * | tee ../SHA256
          md5sum * | tee ../MD5
          mv ../SHA256 .
          mv ../MD5 .

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          discussion_category_name: Announcements
          generate_release_notes: true
          files: artifacts/*
