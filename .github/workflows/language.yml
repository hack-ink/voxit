name: Language Checks

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  rust-check:
    name: Rust check
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache: true
          rustflags: ''
          components: rustfmt, clippy

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Install cargo-make
        uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2.79.0
        with:
          tool: cargo-make

      - name: Install nextest
        uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2.79.0
        with:
          tool: nextest

      - name: Run Rust format check
        run: cargo make fmt-rust-check

      - name: Run Rust style check
        uses: hack-ink/vibe-style@bfb4d2d2f5e4b5e5ce8de4ed1d708b3a2f0e61fe # v0.2.1
        with:
          language: rust
          workspace: true
          args: --all-features
          version: v0.2.1

      - name: Run Rust clippy
        run: cargo make check-rust

      - name: Run Rust tests
        run: cargo make test-rust

  swift-check:
    name: Swift check
    runs-on: macos-26
    steps:
      - name: Fetch latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Print Apple toolchain
        run: |
          sw_vers
          swift --version
          xcodebuild -version

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache: true
          rustflags: ''

      - name: Install cargo-make
        uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2.79.0
        with:
          tool: cargo-make

      - name: Run Swift format check
        run: cargo make fmt-swift-check

      - name: Run Swift style check
        uses: hack-ink/vibe-style@bfb4d2d2f5e4b5e5ce8de4ed1d708b3a2f0e61fe # v0.2.1
        with:
          language: swift
          workspace: true
          args: --all-features
          version: v0.2.1

      - name: Run Swift strict build
        run: cargo make check-swift

      - name: Run Swift tests
        env:
          VOXIT_NATIVE_HOST_SIGN_IDENTITY: '-'
        run: cargo make test-swift

  toml-check:
    name: TOML check
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache: true
          rustflags: ''

      - name: Install cargo-make
        uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2.79.0
        with:
          tool: cargo-make

      - name: Install taplo
        uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2.79.0
        with:
          tool: taplo

      - name: Run TOML format check
        run: cargo make fmt-toml-check
